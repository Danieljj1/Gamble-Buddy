<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Roulette Reverse Martingale</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/nav.css') }}" />
    <style>
      :root { --accent: #D94545; }
    </style>
  </head>
  <body>
    <div class="phone">
      <div class="page-header">
        <h1 class="page-title">Reverse Martingale</h1>
        <p class="page-subtitle">Roulette &bull; Bet Sequence</p>
      </div>

      <div class="divider"></div>

      <div class="input-group">
        <label class="input-label" for="userInput">Starting bet per spin</label>
        <input class="input-field" type="text" id="userInput" placeholder="e.g. 10" />
      </div>

      <button class="btn-primary" onclick="variableInput()">Calculate Sequence</button>

      <div class="info-note">
        After every win, double your bet to ride the streak. After any loss, return to your starting bet.
      </div>

      <div id="betValue"></div>

      <script>
        function variableInput() {
          const bet = Number(document.getElementById('userInput').value);
          if (!bet || bet <= 0) return;

          const events = [
            'Initial bet',
            'After 1 win', 'After 2 wins', 'After 3 wins',
            'After 4 wins', 'After 5 wins', 'After 6 wins',
            'After 7 wins', 'After 8 wins', 'After 9 wins',
            'After 10 wins'
          ];

          const rows = events.map((label, i) => {
            const amount = bet * Math.pow(2, i);
            return `<tr><td>${label}</td><td>$${amount.toLocaleString()}</td></tr>`;
          }).join('');

          document.getElementById('betValue').innerHTML = `
            <div class="bet-table-wrap">
              <table class="bet-table">
                <thead><tr><th>Round</th><th>Bet</th></tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>
          `;
        }
      </script>

      <div class="nav">
        <a href="/roulette">Back</a>
        <a href="/">Home</a>
      </div>
    </div>
  </body>
</html>
