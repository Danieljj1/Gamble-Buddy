<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Low Volatility Slots</title>
    <script src="{{ url_for('static', filename='js/gambleBuddy.js') }}" defer></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/nav.css') }}" />
    <style>
      :root { --accent: #C9A84C; }
    </style>
  </head>
  <body>
    <div class="phone">
      <div class="page-header">
        <h1 class="page-title">Low Volatility</h1>
        <p class="page-subtitle">Slots &bull; Budget Calculator</p>
      </div>

      <div class="divider"></div>

      <div class="input-group">
        <label class="input-label" for="hours">Hours to play</label>
        <input class="input-field" type="number" id="hours" placeholder="e.g. 2" />
      </div>

      <div class="input-group">
        <label class="input-label" for="bet">Bet per spin ($)</label>
        <input class="input-field" type="number" id="bet" placeholder="e.g. 0.50" />
      </div>

      <button class="btn-primary" onclick="calculateLVBudget()">Calculate Budget</button>

      <div class="info-note">
        Low volatility slots average ~600 spins per hour with frequent smaller payouts.
      </div>

      <div class="result-card" id="result-wrap" style="display:none">
        <p class="result-label">Required budget</p>
        <p class="result-value" id="lowVol"></p>
      </div>

      <script>
        function calculateLVBudget() {
          const hrs = Number(document.getElementById('hours').value);
          const bet = Number(document.getElementById('bet').value);
          if (!hrs || !bet) return;
          const budget = hrs * 600 * bet;
          document.getElementById('lowVol').textContent = '$' + budget.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
          document.getElementById('result-wrap').style.display = '';
        }
      </script>

      <div class="nav">
        <a href="/slots">Back</a>
        <a href="/">Home</a>
      </div>
    </div>
  </body>
</html>
