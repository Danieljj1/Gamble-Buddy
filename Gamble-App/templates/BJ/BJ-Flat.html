<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blackjack Flat Bet</title>
    <script src="{{ url_for('static', filename='js/gambleBuddy.js') }}" defer></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/nav.css') }}" />
    <style>
      :root { --accent: #3CB872; }
    </style>
  </head>
  <body>
    <div class="phone">
      <div class="page-header">
        <h1 class="page-title">Flat Bet</h1>
        <p class="page-subtitle">Blackjack &bull; Budget Calculator</p>
      </div>

      <div class="divider"></div>

      <div class="result-card">
        <p class="result-label">Recommended flat bet</p>
        <p class="result-value" id="flatBetResult">$0.00</p>
      </div>

      <div class="pill-section">
        <p class="section-label">Session length</p>
        <div class="pill-group" id="time-group">
          <button id="15min" class="pill-btn">15 min</button>
          <button id="30min" class="pill-btn">30 min</button>
          <button id="45min" class="pill-btn">45 min</button>
          <button id="60min" class="pill-btn">60 min</button>
        </div>
      </div>

      <div class="pill-section">
        <p class="section-label">Budget</p>
        <div class="pill-group" id="budget-group">
          <button id="budget100"  class="pill-btn">$100</button>
          <button id="budget200"  class="pill-btn">$200</button>
          <button id="budget300"  class="pill-btn">$300</button>
          <button id="budget400"  class="pill-btn">$400</button>
          <button id="budget500"  class="pill-btn">$500</button>
          <button id="budget600"  class="pill-btn">$600</button>
          <button id="budget700"  class="pill-btn">$700</button>
          <button id="budget800"  class="pill-btn">$800</button>
          <button id="budget900"  class="pill-btn">$900</button>
          <button id="budget1000" class="pill-btn">$1000</button>
        </div>
      </div>

      <script>
        function setActive(groupId, activeId) {
          document.querySelectorAll('#' + groupId + ' .pill-btn').forEach(btn => {
            btn.classList.toggle('active', btn.id === activeId);
          });
        }

        function handleBudget(amount, id) {
          updateBudget(amount);
          setActive('budget-group', id);
          displayFlatBet();
        }

        function handleHour(hours, id) {
          updateHour(hours);
          setActive('time-group', id);
          displayFlatBet();
        }

        function displayFlatBet() {
          const rate = bjRate();
          document.getElementById('flatBetResult').textContent = '$' + rate.toFixed(2);
        }

        document.addEventListener('DOMContentLoaded', () => {
          document.getElementById('budget100').addEventListener('click',  () => handleBudget(100,  'budget100'));
          document.getElementById('budget200').addEventListener('click',  () => handleBudget(200,  'budget200'));
          document.getElementById('budget300').addEventListener('click',  () => handleBudget(300,  'budget300'));
          document.getElementById('budget400').addEventListener('click',  () => handleBudget(400,  'budget400'));
          document.getElementById('budget500').addEventListener('click',  () => handleBudget(500,  'budget500'));
          document.getElementById('budget600').addEventListener('click',  () => handleBudget(600,  'budget600'));
          document.getElementById('budget700').addEventListener('click',  () => handleBudget(700,  'budget700'));
          document.getElementById('budget800').addEventListener('click',  () => handleBudget(800,  'budget800'));
          document.getElementById('budget900').addEventListener('click',  () => handleBudget(900,  'budget900'));
          document.getElementById('budget1000').addEventListener('click', () => handleBudget(1000, 'budget1000'));

          document.getElementById('15min').addEventListener('click', () => handleHour(0.25, '15min'));
          document.getElementById('30min').addEventListener('click', () => handleHour(0.5,  '30min'));
          document.getElementById('45min').addEventListener('click', () => handleHour(0.75, '45min'));
          document.getElementById('60min').addEventListener('click', () => handleHour(1,    '60min'));

          displayFlatBet();
        });
      </script>

      <div class="nav">
        <a href="/blackjack">Back</a>
        <a href="/">Home</a>
      </div>
    </div>
  </body>
</html>
