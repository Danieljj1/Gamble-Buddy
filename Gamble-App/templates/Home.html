<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Casino Buddy</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/base.css') }}" />
    <style>
      :root { --accent: #C9A84C; }

      /* Coach featured card */
      .coach-card {
        display: flex;
        align-items: center;
        gap: 16px;
        background: var(--surface);
        border: 1px solid var(--border-gold);
        border-radius: var(--radius-lg);
        padding: 20px;
        text-decoration: none;
        margin-top: 32px;
        margin-bottom: 4px;
        transition: background 0.18s ease, border-color 0.18s ease;
        position: relative;
        overflow: hidden;
      }

      .coach-card::after {
        content: 'FEATURED';
        position: absolute;
        top: 10px;
        right: -20px;
        background: var(--gold);
        color: #0a0d12;
        font-size: 0.5rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        padding: 3px 28px;
        transform: rotate(45deg);
        transform-origin: center;
      }

      .coach-card:hover {
        background: var(--surface-raised);
        border-color: var(--gold);
      }

      .coach-icon {
        width: 52px;
        height: 52px;
        border-radius: 14px;
        background: rgba(201, 168, 76, 0.12);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        font-size: 24px;
      }

      .coach-body { flex: 1; }

      .coach-title {
        display: block;
        font-size: 1rem;
        font-weight: 700;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--gold-light);
      }

      .coach-sub {
        display: block;
        font-size: 0.7rem;
        font-weight: 500;
        color: var(--muted);
        margin-top: 3px;
        line-height: 1.4;
      }

      .coach-arrow {
        font-size: 1rem;
        color: var(--subtle);
        transition: color 0.18s ease;
      }

      .coach-card:hover .coach-arrow { color: var(--gold); }
    </style>
  </head>
  <body>
    <div class="phone">
      <div class="page-header">
        <h1 class="page-title">Casino Buddy</h1>
        <p class="page-subtitle">Bet smarter. Play longer.</p>
      </div>

      <!-- Bankroll Coach featured card -->
      <a class="coach-card" href="/coach" aria-label="Open Bankroll Management Coach">
        <div class="coach-icon">&#x1F4B0;</div>
        <div class="coach-body">
          <span class="coach-title">Bankroll Coach</span>
          <span class="coach-sub">Data-driven strategy &amp; session budgeting</span>
        </div>
        <span class="coach-arrow">&#8594;</span>
      </a>

      <div class="divider"></div>

      <p class="section-label">Game strategies</p>

      <nav class="game-list" aria-label="Game shortcuts">
        <a class="game-card bj-card" href="/blackjack" aria-label="Open Blackjack">
          <div class="game-card-icon">
            <img src="{{ url_for('static', filename='images/BJ-Icon.png') }}" alt="" />
          </div>
          <div class="game-card-body">
            <span class="game-card-name">Blackjack</span>
            <span class="game-card-sub">Card strategy</span>
          </div>
          <span class="game-card-arrow">&#8594;</span>
        </a>

        <a class="game-card ro-card" href="/roulette" aria-label="Open Roulette">
          <div class="game-card-icon">
            <img src="{{ url_for('static', filename='images/Roulette-Icon.png') }}" alt="" />
          </div>
          <div class="game-card-body">
            <span class="game-card-name">Roulette</span>
            <span class="game-card-sub">Wheel strategy</span>
          </div>
          <span class="game-card-arrow">&#8594;</span>
        </a>

        <a class="game-card sl-card" href="/slots" aria-label="Open Slots">
          <div class="game-card-icon">
            <img src="{{ url_for('static', filename='images/Slot-Icon.png') }}" alt="" />
          </div>
          <div class="game-card-body">
            <span class="game-card-name">Slots</span>
            <span class="game-card-sub">Budget calculator</span>
          </div>
          <span class="game-card-arrow">&#8594;</span>
        </a>
      </nav>

      <p class="app-tagline">Gamble responsibly &bull; 18+</p>
    </div>
  </body>
</html>
